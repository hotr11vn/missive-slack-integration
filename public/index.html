<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share to Slack — Missive Integration</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    /* Small UI adjustments for the search filter */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .filter-tab {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      background: #f4f4f4;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .filter-tab.active {
      background: #4a154b;
      color: white;
      border-color: #4a154b;
    }
    .chip--channel .chip__avatar {
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #666;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="header">
      <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
      </svg>
      <h1 class="header__title">Share to Slack</h1>
    </header>

    <!-- ── State: no conversation selected ─────────────────────── -->
    <div id="state-empty" class="state">
      <div class="state__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <polyline points="3 7 12 13 21 7"/>
        </svg>
      </div>
      <p class="state__text">Select an email conversation in Missive to share it to Slack.</p>
    </div>

    <!-- ── State: email loaded, ready to share ─────────────────── -->
    <div id="state-ready" class="state hidden">

      <!-- Email preview card -->
      <div class="card" id="email-card">
        <div class="card__subject" id="email-subject"></div>
        <div class="card__meta">
          <span id="email-from"></span>
          <span class="card__sep">→</span>
          <span id="email-to"></span>
        </div>
        <div class="card__date" id="email-date"></div>
        <div class="card__body" id="email-body"></div>
      </div>

      <!-- Slack target picker -->
      <label class="label">Send to Slack</label>
      
      <div class="filter-tabs">
        <div id="tab-users" class="filter-tab active">Users</div>
        <div id="tab-channels" class="filter-tab">Channels</div>
      </div>

      <div class="select-wrapper">
        <input
          type="text"
          id="slack-search"
          class="input"
          placeholder="Search users…"
          autocomplete="off"
        />
        <ul id="slack-list" class="dropdown hidden"></ul>
      </div>

      <!-- Selected target chip -->
      <div id="selected-target" class="chip hidden">
        <div id="selected-avatar-container" class="chip__avatar-container">
          <img id="selected-avatar" class="chip__avatar" src="" alt="" />
        </div>
        <span id="selected-name" class="chip__name"></span>
        <button id="clear-target" class="chip__clear" title="Clear selection">&times;</button>
      </div>

      <!-- Optional personal note -->
      <label class="label" for="personal-note">Add a note (optional)</label>
      <textarea id="personal-note" class="textarea" rows="2" placeholder="e.g. FYI — see the attachment"></textarea>

      <!-- Send button -->
      <button id="btn-send" class="btn btn--primary" disabled>
        <span id="btn-send-label">Send to Slack</span>
        <span id="btn-send-spinner" class="spinner hidden"></span>
      </button>

      <!-- Status message -->
      <div id="status" class="status hidden"></div>
    </div>

    <!-- ── State: loading ──────────────────────────────────────── -->
    <div id="state-loading" class="state hidden">
      <div class="loader"></div>
      <p class="state__text">Loading…</p>
    </div>

    <!-- ── State: error ────────────────────────────────────────── -->
    <div id="state-error" class="state hidden">
      <p class="state__text state__text--error" id="error-message"></p>
      <button class="btn btn--small" onclick="location.reload()">Retry</button>
    </div>

  </div>

  <!-- Missive JS SDK -->
  <script src="https://integrations.missiveapp.com/missive.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
